<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday 🎉</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="wrapper">

  <div class="content">

```
<!-- LEFT -->
<div class="left">
  <h1>Happy Birthday 🎉</h1>

  <button id="btn__letter">
    Click here for the wonderful letter 💌
  </button>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="image">
    <img src="Melita.jpg" alt="Melita">
  </div>

  <h2>❤️ Sunshine Lady! ❤️</h2>
</div>
```

  </div>

  <!-- LETTER -->

  <div class="box__letter">
    <div class="letter__border">

```
  <div class="close">✖</div>

  <div class="letter">
    <h2>To you ❤️</h2>
    <p id="letterText"></p>
  </div>

</div>
```

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const btn = document.getElementById("btn__letter");
  const box = document.querySelector(".box__letter");
  const border = document.querySelector(".letter__border");
  const close = document.querySelector(".close");
  const text = document.getElementById("letterText");

  const message = `Happy Birthday, Melita 😊
You have a really calm and kind presence that makes people feel at ease.
I hope this year brings you everything you’ve been quietly wishing for ✨
Wishing you all the happiness and a beautiful future ahead!`;

  btn.addEventListener("click", function () {
    box.style.display = "block";
    border.style.display = "block";
    text.innerText = message;
  });

  close.addEventListener("click", function () {
    box.style.display = "none";
    border.style.display = "none";
  });

});
</script>

</body>
</html>
