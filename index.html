<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday 🎉</title>

```
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
```

</head>

<body>
<div id="wrapper">

```
<!-- FLAGS -->
<div class="flag__birthday">
    <img src="1.png" width="350" class="flag__left">
    <img src="1.png" width="350" class="flag__right">
</div>

<div class="content">

    <!-- LEFT -->
    <div class="left">
        <div class="title">
            <h1 class="happy">Happy</h1>
            <h1 class="birthday">Birthday</h1>

            <div class="hat">
                <img src="11.png" width="130">
            </div>
        </div>

        <div class="date__of__birth">
            <span>May 15</span>
        </div>

        <div class="btn">
            <button id="btn__letter">
                Click here for the wonderful letter
            </button>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="box__account">

            <div class="image">
                <!-- FIXED IMAGE -->
                <img src="melita.jpg" alt="Melita">
            </div>

            <div class="name">
                ❤️ <span>Sunshine Lady!</span> ❤️
            </div>

            <div class="balloon_one">
                <img src="balloon1.png" width="100">
            </div>

            <div class="balloon_two">
                <img src="balloon2.png" width="100">
            </div>

        </div>
    </div>
</div>

<!-- LETTER -->
<div class="box__letter">
    <div class="letter__border">

        <div class="close">✖</div>

        <div class="letter">
            <div class="title__letter">To you ❤️</div>

            <div class="content__letter">
                <div class="right">
                    <div class="text__letter">
                        <p id="letterText"></p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>
```

</div>

<script>
const message = `Happy Birthday, Melita 😊
You have a really calm and kind presence that makes people feel at ease.
I hope this year brings you everything you’ve been quietly wishing for ✨
Wishing you all the happiness and a beautiful future ahead!`;

document.getElementById("btn__letter").onclick = function () {
    document.querySelector(".box__letter").style.display = "block";
    document.querySelector(".letter__border").style.display = "block";
    document.getElementById("letterText").innerText = message;
};

document.querySelector(".close").onclick = function () {
    document.querySelector(".box__letter").style.display = "none";
    document.querySelector(".letter__border").style.display = "none";
};
</script>

</body>
</html>
