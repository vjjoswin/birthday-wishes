  </div>

  <!-- SCRIPT -->

  <script>
    const message = `Happy Birthday, Melita 😊
You have a really calm and kind presence that makes people feel at ease.
I hope this year brings you everything you’ve been quietly wishing for ✨
Wishing you all the happiness and a beautiful future ahead!`;

    const openBtn = document.getElementById("btn__letter");
    const closeBtn = document.querySelector(".close");
    const box = document.querySelector(".box__letter");
    const border = document.querySelector(".letter__border");
    const text = document.getElementById("letterText");

    openBtn.addEventListener("click", () => {
      box.style.display = "block";
      border.style.display = "block";
      text.innerText = message;
    });

    closeBtn.addEventListener("click", () => {
      box.style.display = "none";
      border.style.display = "none";
    });
  </script>

</body>
